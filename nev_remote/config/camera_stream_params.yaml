camera_streamer:
  ros__parameters:
    # ROS2 image topic to subscribe (sensor_msgs/Image)
    image_topic: /camera/image_raw

    # GCS WebSocket endpoint (vehicle connects outbound → LTE NAT 통과)
    gcs_url: ws://127.0.0.1:8080/ws/vehicle

    # JPEG compression quality (1-100, higher = better quality / more bandwidth)
    jpeg_quality: 80

    # Maximum frame send rate (fps). Frames exceeding this rate are dropped.
    max_fps: 30.0
