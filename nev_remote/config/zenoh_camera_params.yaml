zenoh_camera:
  ros__parameters:
    image_topic:          "/camera/camera/color/image_raw"
    zenoh_locator:        "tcp/203.250.33.77:80"

    width:                640
    height:               480

    max_fps:              15.0

    # h265parse의 SPS/PPS 삽입 주기
    # -1 = 매 IDR 프레임마다 삽입
    #  0 = 최초 1회만 삽입
    #  N = N초마다 삽입
    config_interval:      -1

    # ── videoconvert 파라미터 ──

    # 알파 채널 처리 방식
    # "copy" = 입력 알파값 그대로 출력
    # "set"  = alpha-value 값으로 알파 고정
    # "mult" = 입력 알파값에 alpha-value를 곱함
    alpha-mode:           "copy"

    # alpha-mode가 set 또는 mult일 때 사용할 알파 값
    # 범위: 0.0 ~ 1.0
    alpha-value:          1.0

    # 크로마(색차) 리샘플링 수행 범위
    # "full"           = 업샘플링/다운샘플링 모두 수행
    # "upsample-only"  = 업샘플링만 수행
    # "downsample-only"= 다운샘플링만 수행
    # "none"           = 크로마 리샘플링 건너뜀
    chroma-mode:          "full"

    # 크로마 리샘플링 알고리즘
    # "nearest" = 최근접 보간. 가장 빠름, 화질 낮음
    # "linear"  = 선형 보간. 속도/화질 균형
    # "cubic"   = 3차 보간. linear보다 화질 높음
    # "sinc"    = sinc 보간. 고품질, 느림
    # "lanczos" = lanczos 보간. 최고 품질, 가장 느림
    chroma-resampler:     "linear"

    # 비트 깊이 축소 시 디더링 방식
    # "none"           = 디더링 없음
    # "verterr"        = 수직 오차 확산
    # "floyd-steinberg"= Floyd-Steinberg 오차 확산. 고품질
    # "sierra-lite"    = Sierra Lite 오차 확산. floyd-steinberg보다 빠름
    # "bayer"          = Bayer 패턴 디더링. 규칙적 패턴, 빠름
    dither:               "bayer"

    # 디더링 양자화 단위
    # 값이 클수록 디더링 강도 증가
    # 범위: 0 ~ 4294967295
    dither-quantization:  1

    # 감마 보정 수행 방식
    # "none"  = 감마 변환 수행 안 함
    # "remap" = 입출력 색공간 기준으로 감마 변환 적용
    gamma-mode:           "none"

    # 색공간 행렬 변환 수행 범위
    # "full"        = 입력/출력 행렬 변환 모두 수행
    # "input-only"  = 입력 행렬 변환만 수행
    # "output-only" = 출력 행렬 변환만 수행
    # "none"        = 행렬 변환 건너뜀
    matrix-mode:          "full"

    # videoconvert CPU 스레드 수
    # 0 = 자동 (GStreamer가 결정)
    # 범위: 0 ~ 4294967295
    n-threads:            4

    # 색 원색(Primaries) 변환 수행 방식
    # "none"       = 원색 변환 수행 안 함
    # "merge-only" = 행렬 변환과 병합할 때만 수행
    # "fast"       = 근사값으로 빠르게 변환
    primaries-mode:       "none"

    # 다운스트림 QoS 이벤트 처리 여부
    # true  = 수신 측이 느리면 프레임 스킵 가능
    # false = QoS 이벤트 무시
    vc-qos:               true

    # ── nvh265enc 파라미터 ──

    # 공간적 적응형 양자화 강도
    # spatial-aq: true 일 때만 유효
    # 0      = 자동 선택
    # 1 ~ 15 = 1(약함) ~ 15(매우 강함)
    aq-strength:          0

    # AU(Access Unit) 구분자 삽입 여부
    # true  = AU 구분자 삽입 (일부 디코더/파서가 요구)
    # false = AU 구분자 미삽입
    aud:                  true

    # lookahead 활성화 시 B프레임 삽입 위치 자동 결정
    # rc-lookahead > 0 이고 bframes > 0 일 때만 유효
    # NULL/READY 상태에서만 변경 가능
    # true / false
    b-adapt:              false

    # I/P 프레임 사이 B프레임 수
    # 저지연 목적이면 반드시 0으로 설정
    # NULL/READY 상태에서만 변경 가능
    # 범위: 0 ~ 5
    bframes:              0

    # 목표 비트레이트 (kbps)
    # 0 = preset 자동 결정
    # 범위: 0 ~ 2048000
    bitrate:              500

    # VBR 모드 목표 화질 수준 (CQ 모드)
    # 0.0      = 자동
    # 1 ~ 51   = 값이 클수록 저화질/저용량
    # rc-mode가 vbr 계열일 때만 유효
    const-quality:        0.0

    # IDR(인트라) 프레임 간격 (프레임 수 단위)
    # -1 = 무한 (최초 1회만 IDR 생성)
    #  N = N프레임마다 IDR 삽입
    # 범위: -1 ~ 2147483647
    gop-size:             15

    # lookahead 활성화 시 I프레임 삽입 위치 자동 결정
    # rc-lookahead > 0 일 때만 유효
    # NULL/READY 상태에서만 변경 가능
    # true / false
    i-adapt:              false

    # VBR 모드에서 허용할 최대 비트레이트 (kbps)
    # CBR 계열 rc-mode에서는 무시됨
    # 0 = 자동
    # 범위: 0 ~ 2048000
    max-bitrate:          0

    # force-keyunit 요청 최소 간격 (나노초)
    # 0 = 제한 없음
    # 범위: 0 ~ 18446744073709551615
    min-force-key-unit-interval: 0

    # 비참조 P프레임 자동 삽입 여부
    # true  = 비참조 P프레임 삽입. 압축 효율 소폭 향상
    # false = 비참조 P프레임 미삽입
    nonref-p:             false

    # 인코딩 프리셋
    # "default"        = NVENC 기본값
    # "hp"             = 고성능. GPU 부하 낮음, 화질 낮음
    # "hq"             = 고화질. GPU 부하 높음
    # "low-latency"    = 저지연
    # "low-latency-hq" = 저지연 + 고화질
    # "low-latency-hp" = 저지연 + 고성능
    # "lossless"       = 무손실
    # "lossless-hp"    = 무손실 + 고성능
    preset:               "low-latency-hq"

    # nvh265enc 다운스트림 QoS 이벤트 처리 여부
    # true  = 수신 측이 느리면 프레임 스킵 가능
    # false = QoS 이벤트 무시
    qos:                  false

    # 전체 프레임 타입 QP 고정값. qp-const-i/p/b를 일괄 덮어씀
    # rc-mode: constqp 일 때 사용
    # -1     = preset 자동
    # 0 ~ 51 = 낮을수록 고화질/고비트레이트
    qp-const:             -1

    # B프레임 QP 고정값
    # qp-const-i, qp-const-p도 반드시 >= 0 이어야 함
    # qp-const 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-const-b:           -1

    # I프레임 QP 고정값
    # qp-const-p, qp-const-b도 반드시 >= 0 이어야 함
    # qp-const 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-const-i:           -1

    # P프레임 QP 고정값
    # qp-const-i, qp-const-b도 반드시 >= 0 이어야 함
    # qp-const 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-const-p:           -1

    # 전체 프레임 타입 QP 최대값 상한. qp-max-i/p/b를 일괄 덮어씀
    # QP가 이 값을 초과하지 않음 → 최저 화질 보장
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-max:               -1

    # B프레임 QP 최대값 상한
    # qp-max-i, qp-max-p도 반드시 >= 0 이어야 함
    # qp-max 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-max-b:             -1

    # I프레임 QP 최대값 상한
    # qp-max-p, qp-max-b도 반드시 >= 0 이어야 함
    # qp-max 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-max-i:             -1

    # P프레임 QP 최대값 상한
    # qp-max-i, qp-max-b도 반드시 >= 0 이어야 함
    # qp-max 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-max-p:             -1

    # 전체 프레임 타입 QP 최소값 하한. qp-min-i/p/b를 일괄 덮어씀
    # QP가 이 값보다 작아지지 않음 → 최대 비트레이트 간접 제한
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-min:               -1

    # B프레임 QP 최소값 하한
    # qp-min-i, qp-min-p도 반드시 >= 0 이어야 함
    # qp-min 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-min-b:             -1

    # I프레임 QP 최소값 하한
    # qp-min-p, qp-min-b도 반드시 >= 0 이어야 함
    # qp-min 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-min-i:             -1

    # P프레임 QP 최소값 하한
    # qp-min-i, qp-min-b도 반드시 >= 0 이어야 함
    # qp-min 값이 설정되면 덮어씌워짐
    # -1 = preset 자동 / 범위: -1 ~ 51
    qp-min-p:             -1

    # 미래 프레임을 미리 보고 프레임 타입/비트 배분 결정하는 프레임 수
    # 0      = 비활성 (저지연 목적이면 0 권장)
    # 1 ~ 32 = 값이 클수록 압축 효율 향상, 지연 증가
    # NULL/READY 상태에서만 변경 가능
    rc-lookahead:         0

    # 레이트 컨트롤 모드
    # "default"    = NVENC preset 기본값
    # "constqp"    = QP 고정 (qp-const 값 사용)
    # "cbr"        = 단순 CBR
    # "vbr"        = 단순 VBR
    # "cbr-ld-hq"  = 저지연 CBR 고화질 (실시간 스트리밍 권장)
    # "cbr-hq"     = CBR 고화질 (cbr-ld-hq보다 느림)
    # "vbr-hq"     = VBR 고화질 (느림)
    rc-mode:              "cbr-ld-hq"

    # 공간적 적응형 양자화 활성화
    # 화면 내 복잡도가 낮은 영역에 높은 QP를 배정해 비트 절약
    # aq-strength로 강도 조절 가능
    # true / false
    spatial-aq:           true

    # GOP 간 비트레이트 급변 방지
    # true  = GOP 크기 엄격 고정, 비트레이트 안정
    # false = GOP 크기 유동적
    strict-gop:           false

    # 시간적 적응형 양자화 활성화
    # 시간적으로 변화가 적은 구간에 높은 QP를 배정해 비트 절약
    # rc-lookahead > 0 일 때 효과적
    # true / false
    temporal-aq:          false

    # VBV(HRD) 버퍼 크기 (kbits)
    # 값이 작을수록 지연 감소, 비트레이트 변동 증가
    # 0 = NVENC 기본값
    # NULL/READY 상태에서만 변경 가능
    # 범위: 0 ~ 4294967295
    vbv-buffer-size:      0

    # 가중 예측 활성화
    # 페이드 인/아웃 구간의 압축 효율 향상
    # 일부 GPU에서만 지원
    # true / false
    weighted-pred:        false

    # 프레임 재정렬 버퍼 제거
    # true  = 입력 프레임 즉시 출력. bframes: 0 과 함께 사용 필수
    # false = 내부 버퍼링 허용
    zerolatency:          true